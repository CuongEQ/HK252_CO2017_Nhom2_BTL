name: Test OS Simulator

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make python3

    - name: Build project
      run: make all

    - name: Run Tests
      run: |
        chmod +x run.sh
        ./run.sh

    - name: Smart Diff Output
      run: python3 smart_diff.py
