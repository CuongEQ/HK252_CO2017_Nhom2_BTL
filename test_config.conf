# ┌─────────────────────────────────────────────────────────┐
# │            TEST CONFIGURATION FILE                      │
# │  Cấu hình các nhóm module đã triển khai để chạy test   │
# └─────────────────────────────────────────────────────────┘
#
# Đặt giá trị "true" cho các module đã hoàn thành.
# Đặt giá trị "false" để bỏ qua nhóm testcase tương ứng.
# Đặt MODULES=all để chạy tất cả testcase.
#
# Các nhóm module hỗ trợ:
#   syscall          - System call cơ bản (sc, syscall, syscall_list)
#   scheduler        - Bộ lập lịch (sched, mlq không paging)
#   memory           - Quản lý bộ nhớ (memory)
#   paging           - Phân trang (paging, mlq_paging, singleCPU_mlq_paging)
#   synchronization  - Đồng bộ hóa (sync)
#   all              - Chạy tất cả testcase
#
# ─── Cách sử dụng ───
# Mỗi nhánh chỉ cần bật module mình phụ trách.
# Ví dụ nhánh scheduler chỉ cần: MODULES=scheduler
# Ví dụ nhánh đã xong scheduler + syscall: MODULES=scheduler,syscall
# Khi tích hợp đầy đủ: MODULES=all
#

MODULES=syscall
